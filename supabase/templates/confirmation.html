<div style="background:#f6f3ef;padding:32px 16px;font-family:Arial,sans-serif;color:#1f1a17;">
  <div style="max-width:560px;margin:0 auto;background:#fffdf9;border:1px solid #e8dfd5;padding:40px 32px;">
    <p style="margin:0 0 12px;font-size:12px;letter-spacing:0.12em;text-transform:uppercase;color:#8b6f54;">Myrivo</p>
    <h1 style="margin:0 0 16px;font-size:28px;line-height:1.2;font-family:Georgia,serif;color:#1f1a17;">Confirm your email</h1>
    <p style="margin:0 0 16px;font-size:15px;line-height:1.7;color:#4f4338;">
      Finish creating your Myrivo account by confirming the email address you just used to sign up.
    </p>
    <div style="margin:28px 0;">
      <a
        href="{{ .ConfirmationURL }}"
        style="display:inline-block;background:#1f1a17;color:#fffdf9;text-decoration:none;padding:14px 22px;font-size:14px;font-weight:600;"
      >
        Confirm email
      </a>
    </div>
    <p style="margin:0 0 16px;font-size:13px;line-height:1.7;color:#6a5b4e;">
      If the button does not work, copy and paste this link into your browser:
    </p>
    <p style="margin:0 0 24px;font-size:13px;line-height:1.7;word-break:break-all;color:#6a5b4e;">
      <a href="{{ .ConfirmationURL }}" style="color:#6a5b4e;">{{ .ConfirmationURL }}</a>
    </p>
    <p style="margin:0;font-size:13px;line-height:1.7;color:#6a5b4e;">
      If you did not request this, you can ignore this email.
    </p>
  </div>
</div>
